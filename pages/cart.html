<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | Taste of Ceylon</title>
  <link rel="stylesheet" href="cart.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="main">
    <nav class="navbar">
      <h2 class="logo">Taste of Ceylon</h2>
      <ul class="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="product.html">Products</a></li>
        <li><a href="service.html">Services</a></li>
        <li><a href="About.html">About</a></li>
        <li><a href="login.html" class="login-btn">Login</a></li>
        <li>
          <a href="cart.html" class="cart-nav">
            <i class="fa fa-shopping-cart"></i> Cart <span class="cart-count">(0)</span>
          </a>
        </li>
      </ul>

      <div class="search">
        <input type="search" placeholder="Search spices...">
        <button>Search</button>
      </div>
    </nav>

    <div class="cart-container">
      <div class="cart-header">
        <h1><i class="fas fa-shopping-cart"></i> Your Shopping Cart</h1>
      </div>
      
      <div id="cart-items" class="cart-items">
        <!-- Cart items will be dynamically inserted here -->
      </div>
      
      <div class="cart-actions">
        <button class="clear-cart-btn" onclick="clearCart()">
          <i class="fas fa-trash"></i> Clear Cart
        </button>
        <a href="product.html" class="continue-shopping">
          <i class="fas fa-arrow-left"></i> Continue Shopping
        </a>
      </div>
      
      <div class="cart-summary">
        <div class="cart-total">
          Total Amount: <span id="cart-total">Rs. 0</span>
        </div>
        <button class="checkout-btn" onclick="checkout()">
          <i class="fas fa-lock"></i> Proceed to Checkout
        </button>
        <p style="margin-top: 15px; font-size: 0.9em; color: #666;">
          Free shipping on orders over Rs. 5000
        </p>
      </div>
    </div>
    


   
  <script src="cart.js"></script>
  <script>
    function checkout() {
      if (cart.length === 0) {
        alert('Your cart is empty. Please add items before checkout.');
        return;
      }
      
      // In a real implementation, this would redirect to a checkout page
      alert('Proceeding to checkout. This would redirect to payment in a real implementation.');
      // clearCart(); // Uncomment this if you want to clear cart after checkout
    }
    
    function clearCart() {
      if (cart.length === 0) {
        alert('Your cart is already empty.');
        return;
      }
      
      if (confirm('Are you sure you want to clear your cart?')) {
        cart = [];
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
        displayCartItems();
        alert('Cart cleared successfully.');
      }
    }
  </script>
</body>
</html>
