<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation | Taste of Ceylon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="checkout.css">
</head>
<body>
    <div class="main">
        <!-- Same navbar as other pages -->
        
        <div class="checkout-container">
            <div class="success-message">
                <h2><i class="fas fa-check-circle"></i> Order Confirmed!</h2>
                <p>Thank you for your purchase. Your order has been received.</p>
                <p><strong>Order ID: <span id="order-id"></span></strong></p>
                <a href="index.html" class="continue-shopping">Continue Shopping</a>
            </div>
        </div>
        
        <!-- Same footer as other pages -->
    </div>

    <script>
        // Display order details from localStorage
        const order = JSON.parse(localStorage.getItem('currentOrder'));
        if (order) {
            document.getElementById('order-id').textContent = order.orderId;
        }
    </script>
</body>
</html>
