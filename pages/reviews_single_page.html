
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Customer Reviews (Single File)</title>
  <style>
    :root{
      --brand:#67615c;
      --bg:#fafafa;
      --card:#fff;
      --muted:#666;
      --line:#eee;
      --radius:14px;
      --shadow:0 6px 20px rgba(0,0,0,.06);
    }
    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; background:var(--bg); font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; }
    .wrap{ width:min(1100px, 92%); margin:0 auto; }
    .topbar{ background:var(--brand); color:#fff; }
    .topbar .wrap{ display:flex; align-items:center; gap:260px; padding:14px 0; }
    .topbar nav a{ color:#fff; text-decoration:none; margin-right:25px; }
    .topbar nav a.active{ text-decoration:underline; }
    h1,h3{ margin:0 0 10px; }
    main{ padding:24px 0; }
    .card{ background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; }
    .grid{ display:grid; grid-template-columns: 1fr 1fr; gap:18px; align-items:start; }
    @media (max-width: 820px){ .grid{ grid-template-columns:1fr; } }
    label{ font-weight:600; display:block; margin:.5rem 0 .35rem; }
    input[type="text"], textarea, select{ width:100%; padding:10px; border:1px solid var(--line); border-radius:10px; font:inherit; background:#fff; }
    textarea{ resize:vertical; }
    .btn{ background:var(--brand); color:#fff; border:none; padding:10px 14px; border-radius:10px; cursor:pointer; }
    .btn.ghost{ background:#fff; color:#000; border:1px solid var(--line); }
    .row{ display:flex; gap:10px; margin-top:8px; }
    .summary{ display:flex; align-items:center; gap:8px; margin-top:10px; }
    .avg{ font-weight:800; }
    .stars span{ color:#efb20b; font-size:20px; }
    .count{ color:var(--muted); }
    .stars-input{ display:inline-flex; gap:6px; }
    .stars-input .star{ font-size:22px; line-height:1; background:transparent; border:none; cursor:pointer; color:#efb20b; opacity:.6; }
    .stars-input .star.active, .stars-input .star:hover, .stars-input .star:focus{ opacity:1; transform:scale(1.05); }
    .filters{ display:flex; gap:10px; align-items:center; margin-bottom:10px; }
    .reviews .review{ border-top:1px solid var(--line); padding:12px 0; }
    .review .name{ font-weight:700; }
    .review .meta{ color:var(--muted); font-size:12px; }
    .review .stars{ color:#efb20b; }
    .empty{ text-align:center; color:#444; padding:14px 0; }
    .foot{ padding:18px 0 24px; color:#444; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <strong>Taste of Ceylon</strong>
      <nav>
        <a href="index.html">Home</a>
        <a href="index.html">Home</a>
        <a href="product.html">Products</a>
        <a href="service.html">Services</a>
        <a href="About.html">About</a>
      
      </nav>
    </div>
  </header>

  <main class="wrap">
    <h1>Customer Reviews</h1>

    <div class="product-switcher card">
      <label for="productId">Select product</label>
      <select id="productId">
        <option value="cinnamon-100g">Ceylon Cinnamon (100g)</option>
        <option value="black-pepper-50g">Black Pepper (50g)</option>
        <option value="turmeric-200g">Turmeric Powder (200g)</option>
      </select>
      <div class="summary">
        <div id="avg" class="avg">0.0</div>
        <div id="stars" class="stars" aria-label="Average rating">
          <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
        </div>
        <div id="count" class="count">(0 reviews)</div>
      </div>
    </div>

    <section class="grid">
      <div class="card">
        <h3>Write a review</h3>
        <form id="reviewForm">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name">

          <label>Rating</label>
          <div class="stars-input" id="rateStars" role="radiogroup" aria-label="Select rating">
            <button type="button" class="star" data-v="1" aria-label="1 star">★</button>
            <button type="button" class="star" data-v="2" aria-label="2 stars">★</button>
            <button type="button" class="star" data-v="3" aria-label="3 stars">★</button>
            <button type="button" class="star" data-v="4" aria-label="4 stars">★</button>
            <button type="button" class="star" data-v="5" aria-label="5 stars">★</button>
          </div>
          <input type="hidden" name="rating" id="rating" value="5">

          <label for="comment">Comment</label>
          <textarea id="comment" name="comment" rows="4" placeholder="Share your experience..."></textarea>

          <div class="row">
            <button class="btn" type="submit">Submit Review</button>
            <button class="btn ghost" type="button" id="clear">Clear</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h3>Reviews</h3>
        <div class="filters">
          <label>Filter</label>
          <select id="filter">
            <option value="all">All</option>
            <option value="5">5★</option>
            <option value="4">4★ & up</option>
            <option value="3">3★ & up</option>
            <option value="2">2★ & up</option>
            <option value="1">1★ & up</option>
          </select>
          <input type="search" id="q" placeholder="Search comments...">
        </div>
        <div id="reviews" class="reviews"></div>
        <div id="empty" class="empty" hidden>No reviews yet. Be the first to review!</div>
      </div>
    </section>
  </main>

  <footer class="wrap foot">
    <small>&copy; <span id="year"></span> Spices</small>
  </footer>

  <script>
  (function(){
    const STORAGE_KEY = "spices_reviews_v1";

    // Simple storage
    const DB = {
      read(){
        try{
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : {};
        }catch(e){ return {}; }
      },
      write(obj){
        try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); }catch(e){}
      },
      addReview(productId, review){
        const all = DB.read();
        const list = all[productId] || [];
        list.push({
          id: "rev_" + Date.now() + "_" + Math.random().toString(36).slice(2,8),
          name: review.name || "Anonymous",
          rating: Number(review.rating) || 5,
          comment: review.comment || "",
          ts: new Date().toISOString()
        });
        all[productId] = list;
        DB.write(all);
      },
      getReviews(productId){
        const all = DB.read();
        return all[productId] || [];
      },
      summary(productId){
        const list = DB.getReviews(productId);
        if (!list.length) return { avg: 0, count: 0 };
        const sum = list.reduce((s,r)=> s + (Number(r.rating)||0), 0);
        return { avg: +(sum / list.length).toFixed(1), count: list.length };
      },
      seed(){
        if (DB.summary("cinnamon-100g").count === 0){
          DB.addReview("cinnamon-100g", { name: "Ruwan", rating: 5, comment: "Superb aroma, authentic Ceylon quality!" });
          DB.addReview("cinnamon-100g", { name: "Ishara", rating: 4, comment: "Fresh and well packed. Will buy again." });
        }
      }
    };

    const $ = sel => document.querySelector(sel);
    const $$ = sel => Array.from(document.querySelectorAll(sel));

    $("#year").textContent = new Date().getFullYear();

    // Seed demo
    DB.seed();

    // Elements
    const select = $("#productId");
    const avgEl = $("#avg");
    const countEl = $("#count");
    const reviewsEl = $("#reviews");
    const emptyEl = $("#empty");
    const filterEl = $("#filter");
    const searchEl = $("#q");

    const form = $("#reviewForm");
    const rateStars = $("#rateStars");
    const ratingInput = $("#rating");

    // Interactive rating for form
    function setRating(v){
      ratingInput.value = v;
      $$("#rateStars .star").forEach((btn, i) => btn.classList.toggle("active", i < v));
    }
    rateStars.addEventListener("click", (e)=>{
      const v = Number(e.target.dataset.v);
      if (v) setRating(v);
    });
    setRating(5);

    function setSummary(productId){
      const s = DB.summary(productId);
      const avg = s.avg || 0, count = s.count || 0;
      avgEl.textContent = avg.toFixed(1);
      countEl.textContent = "(" + count + " reviews)";
      const rounded = Math.round(avg);
      $$("#stars span").forEach((el,i)=> el.style.opacity = i < rounded ? "1" : ".25");
    }

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, function(m){
        return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m];
      });
    }

    function renderReviews(productId){
      const listRaw = DB.getReviews(productId);
      let list = listRaw.slice().sort((a,b)=> new Date(b.ts)-new Date(a.ts));

      // filter by rating
      const f = filterEl.value;
      if (f !== "all"){
        const min = Number(f);
        list = list.filter(r => (Number(r.rating)||0) >= min);
      }
      // search
      const q = searchEl.value.trim().toLowerCase();
      if (q){
        list = list.filter(r => (r.comment||"").toLowerCase().includes(q) || (r.name||"").toLowerCase().includes(q));
      }

      if (!list.length){
        emptyEl.hidden = false;
        reviewsEl.innerHTML = "";
        return;
      }
      emptyEl.hidden = true;

      reviewsEl.innerHTML = list.map(r => (
        '<div class="review">' +
          '<div class="name">' + escapeHtml(r.name||"Anonymous") + '</div>' +
          '<div class="meta">' + new Date(r.ts).toLocaleString() + '</div>' +
          '<div class="stars">' + "★".repeat(r.rating) + "☆".repeat(5-r.rating) + '</div>' +
          '<div class="body">' + escapeHtml(r.comment||"") + '</div>' +
        '</div>'
      )).join("");
    }

    function refresh(){
      const productId = select.value;
      setSummary(productId);
      renderReviews(productId);
    }

    select.addEventListener("change", refresh);
    filterEl.addEventListener("change", refresh);
    searchEl.addEventListener("input", refresh);

    form.addEventListener("submit", function(e){
      e.preventDefault();
      const productId = select.value;
      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());
      DB.addReview(productId, data);
      form.reset();
      setRating(5);
      refresh();
      alert("Thanks for your review!");
    });

    // Load productId from URL ?productId=...
    const params = new URLSearchParams(location.search);
    if (params.get("productId")){
      select.value = params.get("productId");
    }

    refresh();
  })();
  </script>
</body>
</html>
